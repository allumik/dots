# Plain tmux config, mirrors nixos/users/allu/confs/tmux.nix for use on
# non-NixOS machines. Requires TPM (https://github.com/tmux-plugins/tpm):
#   git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# then press prefix + I inside tmux to install the plugins below.

set -g default-terminal "tmux-256color"
set -g base-index 1
setw -g pane-base-index 1

set -g status-keys vi
set -g mode-keys vi

setw -g aggressive-resize on

unbind C-BSpace
unbind C-Left
unbind C-Right

set -g mouse on
set -g extended-keys on

set -g visual-activity on
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# No status bar -- it always reserves its own row even with an empty
# format. tmux auto-exports $TMUX into every pane, so add this to your
# shell rc instead to mark the prompt without spending a row:
#   zsh (~/.zshrc, after oh-my-zsh/theme sourcing):
#     [[ -n "$TMUX" ]] && PROMPT="%F{cyan}[tmux]%f $PROMPT"
#   bash (~/.bashrc, after PS1 is set):
#     [ -n "$TMUX" ] && PS1="[tmux]$PS1"
set -g status off
set -g set-titles-string "tmux: #I #W"

# Bindings
unbind %
bind % split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
bind ^ break-pane -d

# Golden-ratio dev layout: left pane (~62%) gets nvim with a netrw
# sidebar, right pane (~38%) is a plain shell for vim-slime's REPL target
bind G split-window -h -p 38 -c "#{pane_current_path}" \; split-window -v -p 38 -c "#{pane_current_path}" \; select-pane -L \; send-keys "nvim -c Lexplore" Enter


# Plugins (via TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
run '~/.tmux/plugins/tpm/tpm'
